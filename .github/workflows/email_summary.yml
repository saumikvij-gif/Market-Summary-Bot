# .github/workflows/email_summary.yml
#
# EMAIL step: sends the most recently generated summary (committed by
# market_summary.yml after the US close). It does not regenerate anything — it
# just reads the latest committed summary + charts and emails them.
#
# Triggering: delivery is driven SOLELY by an external cron-job.com ping, which
# POSTs to the repo's /dispatches endpoint with {"event_type":"send-email"} once a
# day. GitHub's own scheduled triggers were removed because they fire hours late
# (often in the evening HKT instead of the morning) — cron-job.com fires on the
# minute. The `.last_emailed` marker still makes delivery idempotent (a re-fire or
# a no-new-briefing day is skipped, never double-sent).
#
# ⚠ No fallback: the GitHub PAT that cron-job.com uses expires 2026-07-05. If it
#   lapses, the dispatch returns 401 and EMAIL DELIVERY STOPS ENTIRELY (generation
#   still runs). Rotate the PAT before then. (Generate still keeps GitHub's
#   schedule as a delayed fallback; only email is dispatch-only.)
#
# Required secrets (Settings → Secrets and variables → Actions):
#   SMTP_HOST, SMTP_USER, SMTP_PASSWORD, EMAIL_TO   (SMTP_PORT/EMAIL_FROM optional)

name: Email Market Summary

on:
  # ── On-time external trigger (sole scheduler): a cron-job.com ping POSTs to the
  #    repo's /dispatches endpoint with {"event_type":"send-email"}. Fires on the
  #    minute; the dedupe marker prevents duplicates on re-fire / no-new-data days.
  repository_dispatch:
    types: [send-email]

  # ── Manual trigger (useful for testing)
  workflow_dispatch:

jobs:
  email-summary:
    name: Email Latest Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Needed so the post-send step can commit the .last_emailed marker.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Email the latest summary
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python send_latest.py

      - name: Persist the sent-marker
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f .last_emailed ] && git add .last_emailed || true
          if git diff --staged --quiet; then
            echo "No marker change (nothing sent, or already up to date)."
            exit 0
          fi
          git commit -m "chore: mark email sent $(date -u +'%Y-%m-%d') [skip ci]"
          # Survive a race with a concurrent push (the marker line merges cleanly).
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break
            echo "Push attempt $attempt failed; retrying after fetch…"
            sleep 5
          done

      - name: Notify on failure
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WORKFLOW_NAME: Email Market Summary
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify_failure.py
