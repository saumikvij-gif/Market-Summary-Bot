# .github/workflows/tests.yml
#
# Runs the unit test suite on every push and pull request, so regressions in
# parsing, scoring, or formatting are caught before they reach a scheduled run.
# (The bot's own chore commits use "[skip ci]", so they don't trigger this.)

name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q
