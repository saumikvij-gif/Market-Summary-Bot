# .github/workflows/market_summary.yml
#
# GENERATE step: runs after the US market close (Mon–Fri 21:30 UTC) to produce
# the summary, update the trend database, and regenerate the charts — then
# commits them. It does NOT send email; delivery is a separate workflow
# (email_summary.yml) scheduled for 9 AM Hong Kong time.
#
# Required secret:
#   ANTHROPIC_API_KEY  →  Settings → Secrets and variables → Actions → New secret

name: Generate Market Summary

on:
  # ── Scheduled trigger: Mon–Fri at 21:30 UTC (≈ 5:30 PM ET, after market close)
  schedule:
    - cron: "30 21 * * 1-5"

  # ── Manual trigger (useful for testing)
  workflow_dispatch:

jobs:
  market-summary:
    name: Generate Market Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write   # needed to commit the summary back to the repo

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the script ─────────────────────────────────────────────────────
      - name: Run market summary script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # No SMTP_* here on purpose: email is sent later by email_summary.yml,
          # so with no SMTP config the script's email step auto-skips.
        run: |
          mkdir -p summaries
          # One report per day — file it by date so re-runs overwrite the same day.
          export OUTPUT_FILE="summaries/market_summary_$(date -u +'%Y-%m-%d').md"
          python market_summary.py

      # ── 5. Commit & push the generated summary ────────────────────────────────
      - name: Commit summary and history to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit the dated summary, the CSV history (text, mergeable), and charts.
          # market_data.db is NOT committed — it's rebuilt from the CSVs.
          git add summaries/ history_quotes.csv history_summaries.csv charts/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "chore: add market summary $(date -u +'%Y-%m-%d') [skip ci]"
          # Integrate any commits pushed since checkout, then push. Retry to
          # survive a race with a concurrent push (CSVs merge cleanly).
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break
            echo "Push attempt $attempt failed; retrying after fetch…"
            sleep 5
          done

      # ── 6. Alert on failure ───────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WORKFLOW_NAME: Generate Market Summary
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify_failure.py
