# .github/workflows/email_summary.yml
#
# EMAIL step: sends the most recently generated summary (committed by
# market_summary.yml after the US close) around 10:15 AM Hong Kong time. It does
# not regenerate anything — it just reads the latest committed summary + charts
# and emails them.
#
# Reliability: GitHub's scheduled triggers are best-effort and frequently delayed
# or silently dropped (no run, no alert). So we schedule THREE staggered times as
# a backstop — if one trigger is dropped, a later one still delivers. To avoid
# duplicate emails, send_latest.py records the last briefing date it sent in the
# committed `.last_emailed` marker and skips if a backstop run already sent today.
#
# Timing (HKT = UTC+8): 10:15 / 10:45 / 11:30 AM HKT = 02:15 / 02:45 / 03:30 UTC,
# Tue–Sat (the day after each Mon–Fri close).
#
# Required secrets (Settings → Secrets and variables → Actions):
#   SMTP_HOST, SMTP_USER, SMTP_PASSWORD, EMAIL_TO   (SMTP_PORT/EMAIL_FROM optional)

name: Email Market Summary

on:
  # ── Staggered backstop: 10:15 / 10:45 / 11:30 AM HKT, Tue–Sat. First run that
  #    succeeds sends + marks the day done; later runs see the marker and skip.
  #    Kept as a fallback — GitHub's scheduler often fires hours late.
  schedule:
    - cron: "15 2 * * 2-6"
    - cron: "45 2 * * 2-6"
    - cron: "30 3 * * 2-6"

  # ── On-time external trigger: a cron-job.com ping POSTs to the repo's
  #    /dispatches endpoint with {"event_type":"send-email"} at 10:15 AM HKT
  #    (02:15 UTC). Fires on the minute; the dedupe marker still prevents dupes.
  repository_dispatch:
    types: [send-email]

  # ── Manual trigger (useful for testing)
  workflow_dispatch:

jobs:
  email-summary:
    name: Email Latest Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Needed so the post-send step can commit the .last_emailed marker.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Email the latest summary
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python send_latest.py

      - name: Persist the sent-marker
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f .last_emailed ] && git add .last_emailed || true
          if git diff --staged --quiet; then
            echo "No marker change (nothing sent, or already up to date)."
            exit 0
          fi
          git commit -m "chore: mark email sent $(date -u +'%Y-%m-%d') [skip ci]"
          # Survive a race with a concurrent push (the marker line merges cleanly).
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break
            echo "Push attempt $attempt failed; retrying after fetch…"
            sleep 5
          done

      - name: Notify on failure
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WORKFLOW_NAME: Email Market Summary
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify_failure.py
